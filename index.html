<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var s = document.documentElement.getAttribute('data-font');
        if (!s && typeof localStorage !== 'undefined') {
          s = localStorage.getItem('regulatel-font-size');
          if (s === 'sm' || s === 'md' || s === 'lg') document.documentElement.setAttribute('data-font', s);
        }
      })();
    </script>

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet" />
    <title>REGULATEL - Foro Latinoamericano de Entes Reguladores de Telecomunicaciones</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
